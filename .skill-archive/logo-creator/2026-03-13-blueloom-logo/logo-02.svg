<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white"/>

  <!--
    Grid layout:
    - Bar width: 22px
    - Center-to-center spacing: 44px
    - 3 bars each direction
    - Bar positions: 147, 191, 235
    - Mark spans x:100–257, y:100–257 (centered in 400×300 upper zone)

    Weave pattern (plain weave — alternating over/under):
    Row H1 (y=147): V1 over, V2 under, V3 over  →  navy covers (147,147) and (235,147)
    Row H2 (y=191): V1 under, V2 over, V3 under  →  navy covers (191,191)
    Row H3 (y=235): V1 over, V2 under, V3 over  →  navy covers (147,235) and (235,235)
  -->

  <!-- Vertical threads (deep navy) — drawn first, behind horizontal -->
  <rect x="147" y="95" width="22" height="210" rx="5" fill="#030D1F"/>
  <rect x="191" y="95" width="22" height="210" rx="5" fill="#030D1F"/>
  <rect x="235" y="95" width="22" height="210" rx="5" fill="#030D1F"/>

  <!-- Horizontal threads (brand blue) — drawn on top -->
  <rect x="95" y="147" width="210" height="22" rx="5" fill="#0066FF"/>
  <rect x="95" y="191" width="210" height="22" rx="5" fill="#0066FF"/>
  <rect x="95" y="235" width="210" height="22" rx="5" fill="#0066FF"/>

  <!-- Over-under weave: navy passes over blue at these 5 intersections (plain weave checkerboard) -->
  <rect x="147" y="147" width="22" height="22" fill="#030D1F"/>
  <rect x="235" y="147" width="22" height="22" fill="#030D1F"/>
  <rect x="191" y="191" width="22" height="22" fill="#030D1F"/>
  <rect x="147" y="235" width="22" height="22" fill="#030D1F"/>
  <rect x="235" y="235" width="22" height="22" fill="#030D1F"/>

  <!-- Wordmark -->
  <text
    x="200" y="354"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="-0.3"
    fill="#030D1F"
  >BlueLoom<tspan fill="#0066FF" font-weight="400"> Ventures</tspan></text>
</svg>
